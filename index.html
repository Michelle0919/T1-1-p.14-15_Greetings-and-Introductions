<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Greetings and Introductions</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
  />

  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: "Trebuchet MS", Arial, sans-serif;
      background: linear-gradient(90deg, #edf8fb 0%, #fffde9 100%);
    }

    * {
      box-sizing: border-box;
    }

    button {
      cursor: pointer;
      border: none;
      outline: none;
    }

    .app {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: grid;
      grid-template-rows: 11vh 9vh 1fr 28vh 9vh;
      gap: 0.8vh;
      padding: 0.6vh 1.4vw 1vh;
    }

    .title-box {
      width: min(86vw, 1060px);
      height: 100%;
      margin: 0 auto;
      padding: 0;
      background: linear-gradient(90deg, #edf9ff, #fffde9);
      border-radius: 20px 20px 0 0;
      border: 2px solid rgba(56, 189, 248, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.2vw;
      box-shadow: 0 7px 20px rgba(2, 132, 199, 0.08);
    }

    .hi-badge {
      width: clamp(48px, 4vw, 72px);
      height: clamp(48px, 4vw, 72px);
      border-radius: 14px;
      background: #ffe84a;
      border: 4px solid #0284c7;
      color: #075985;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1.5rem, 2vw, 2.5rem);
      font-weight: 900;
      box-shadow: 0 4px 0 rgba(2, 132, 199, 0.18);
      flex: 0 0 auto;
      line-height: 1;
      margin: 0;
      padding: 0;
    }

    .title-text {
      color: #0c4a6e;
      font-weight: 900;
      line-height: 1;
      font-size: clamp(2rem, 3.6vw, 4rem);
      white-space: nowrap;
      text-shadow: 0 3px 0 rgba(14, 165, 233, 0.12);
      margin: 0;
      padding: 0;
    }

    .top-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 1vw;
      min-height: 0;
      align-items: stretch;
      margin: 0;
      padding: 0;
    }

    .status-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.9vw;
      min-height: 0;
      margin: 0;
      padding: 0;
    }

    .status-card {
      height: 100%;
      background: #fff;
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      line-height: 1;
      box-shadow: 0 4px 0 rgba(15, 23, 42, 0.08);
      margin: 0;
      padding: 0;
    }

    .status-card .label {
      font-size: clamp(0.78rem, 0.95vw, 1.1rem);
      font-weight: 900;
      margin: 0 0 0.45vh 0;
      padding: 0;
      line-height: 1;
    }

    .status-card .value {
      font-size: clamp(1.8rem, 2.1vw, 2.8rem);
      font-weight: 900;
      color: #0f172a;
      margin: 0;
      padding: 0;
      line-height: 1;
    }

    .card-blue { border: 3px solid #38bdf8; }
    .card-purple { border: 3px solid #a78bfa; }
    .card-green { border: 3px solid #34d399; }
    .card-orange { border: 3px solid #fb923c; }

    .control-panel {
      height: 100%;
      display: flex;
      align-items: center;
      gap: 0.7vw;
      background: rgba(255,255,255,0.75);
      border-radius: 12px;
      padding: 0.6vh 0.8vw;
      margin: 0;
    }

    .soft-button {
      height: 70%;
      min-width: clamp(74px, 5vw, 110px);
      border-radius: 10px;
      color: white;
      font-size: clamp(0.95rem, 1vw, 1.2rem);
      font-weight: 900;
      box-shadow: 0 4px 0 rgba(15, 23, 42, 0.18);
      transition: transform 0.1s ease, box-shadow 0.1s ease, filter 0.1s ease;
      line-height: 1;
      margin: 0;
      padding: 0;
    }

    .soft-button:hover {
      filter: brightness(1.06);
    }

    .soft-button:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 rgba(15, 23, 42, 0.18);
    }

    .btn-listen {
      background: #34d399;
      border: 3px solid #059669;
    }

    .btn-pause {
      background: #fbbf24;
      border: 3px solid #d97706;
    }

    .btn-restart {
      background: #fb7185;
      border: 3px solid #e11d48;
    }

    .main-row {
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr 22vw;
      gap: 1vw;
      padding: 0 2vw;
      margin: 0;
    }

    .question-area {
      min-height: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      margin: 0;
      padding: 0;
    }

    .turn-pill {
      align-self: center;
      background: #1fa3e8;
      color: white;
      font-weight: 900;
      font-size: clamp(1.5rem, 1.8vw, 2.4rem);
      padding: 1vh 2.1vw;
      border-radius: 18px;
      border: 3px solid #7dd3fc;
      box-shadow: 0 5px 0 rgba(2, 132, 199, 0.22);
      margin: 0 0 1.6vh 0;
      min-width: 190px;
      text-align: center;
      line-height: 1;
    }

    .speech-bubble {
      width: 100%;
      min-height: 31vh;
      background: white;
      border: 4px dashed #38bdf8;
      border-radius: 28px;
      position: relative;
      padding: 0;
      margin: 0;
      display: grid;
      grid-template-rows: 20% 80%;
      box-shadow: 0 8px 0 rgba(14, 165, 233, 0.12);
      overflow: visible;
    }

    .speech-bubble::after {
      content: "";
      position: absolute;
      left: 8%;
      bottom: -1.6vh;
      width: 34px;
      height: 34px;
      background: white;
      border-left: 4px dashed #38bdf8;
      border-bottom: 4px dashed #38bdf8;
      transform: rotate(-35deg);
    }

    .bubble-label {
      color: #075985;
      font-size: clamp(1.5rem, 1.9vw, 2.6rem);
      font-weight: 900;
      margin: 0;
      padding: 0 0 0 1.5vw;
      line-height: 1;
      display: flex;
      align-items: center;
    }

    .prompt-wrap {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: visible;
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }

    .prompt-text {
      color: #07132f;
      font-size: clamp(4rem, 10vw, 180px);
      line-height: 1;
      font-weight: 900;
      white-space: nowrap;
      transform-origin: left center;
      display: inline-block;
      max-width: none;
      margin: 0;
      padding: 0;
    }

    .side-panel {
      min-height: 0;
      background: rgba(255,255,255,0.7);
      border-radius: 0 0 20px 20px;
      display: grid;
      grid-template-rows: auto 1fr;
      align-items: start;
      justify-items: center;
      padding: 0.8vh 0.8vw;
      margin: 0;
    }

    .stars {
      justify-self: end;
      background: #fde047;
      border: 3px solid #eab308;
      color: #422006;
      font-size: clamp(1rem, 1.2vw, 1.5rem);
      font-weight: 900;
      padding: 0.65vh 1.1vw;
      border-radius: 12px;
      box-shadow: 0 4px 0 rgba(234, 179, 8, 0.18);
      margin: 0 0 1.2vh 0;
      line-height: 1;
    }

    .visual-card {
      width: 100%;
      height: 100%;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: rgba(255,255,255,0.45);
      padding: 0;
      margin: 0;
    }

    .visual-svg {
      width: 90%;
      height: 90%;
    }

    .choice-row {
      min-height: 0;
      padding: 0;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .choice-grid {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.6vh 1.3vw;
      align-content: center;
      padding: 0;
      margin: 0;
    }

    .choice-grid.reveal {
      grid-template-columns: 1fr;
      gap: 0;
      align-content: stretch;
    }

    .choice-card {
      width: 100%;
      height: 100%;
      min-height: 0;
      background: #fff;
      border: 3px solid #4fc3ff;
      border-radius: 16px;
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 0.8vw;
      padding: 0;
      margin: 0;
      box-shadow: 0 4px 0 rgba(79, 195, 255, 0.12);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
      overflow: hidden;
    }

    .choice-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 0 rgba(79, 195, 255, 0.16);
    }

    .choice-card:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 rgba(79, 195, 255, 0.16);
    }

    .letter {
      flex: 0 0 auto;
      width: clamp(74px, 4.8vw, 94px);
      height: 100%;
      border-radius: 12px;
      background: #e8f5ff;
      border-right: 3px solid #38bdf8;
      border-top: 0;
      border-bottom: 0;
      border-left: 0;
      color: #075985;
      font-size: clamp(2rem, 3vw, 4rem);
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      margin: 0;
      padding: 0;
    }

    .choice-text-wrap {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: visible;
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }

    .choice-text {
      color: #07132f;
      font-size: clamp(2.5rem, 5vw, 90px);
      line-height: 1;
      font-weight: 900;
      white-space: nowrap;
      overflow: visible;
      text-overflow: clip;
      display: inline-block;
      transform-origin: left center;
      max-width: none;
      margin: 0;
      padding: 0;
    }

    .reveal-card {
      width: 100%;
      height: 100%;
      min-height: 0;
      background: linear-gradient(90deg, #c6ebd2 0%, #d5f2dc 100%);
      border: 5px solid #10b981;
      border-radius: 22px;
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 1vw;
      padding: 0;
      margin: 0;
      box-shadow: 0 8px 0 rgba(16, 185, 129, 0.16);
      overflow: hidden;
    }

    .reveal-card .letter {
      width: clamp(92px, 6vw, 130px);
      height: 100%;
      font-size: clamp(2.6rem, 4vw, 5.2rem);
      background: #dff1ff;
      border-right: 5px solid #38bdf8;
      border-radius: 16px;
    }

    .reveal-card .choice-text {
      font-size: clamp(4rem, 8vw, 150px);
      line-height: 1;
      white-space: nowrap;
      overflow: visible;
      text-overflow: clip;
      color: #091633;
      display: inline-block;
      transform-origin: left center;
      margin: 0;
      padding: 0;
    }

    .footer {
      min-height: 0;
      background: white;
      border: 4px solid #0ea5e9;
      border-radius: 16px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 0.8vw;
      padding: 0.7vh 0.8vw;
      margin: 0;
      box-shadow: 0 5px 0 rgba(14, 165, 233, 0.12);
    }

    .team-scoreboard {
      height: 100%;
      display: grid;
      gap: 0.5vw;
      overflow: hidden;
      padding: 0;
      margin: 0;
    }

    .team-card {
      height: 100%;
      border: 3px solid #cbd5e1;
      border-radius: 10px;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      line-height: 1;
      min-width: 0;
      padding: 0;
      margin: 0;
    }

    .team-card.active {
      background: #f5dc43;
      border-color: #eab308;
      box-shadow: 0 0 0 3px rgba(250, 204, 21, 0.16);
    }

    .team-name {
      font-size: clamp(0.72rem, 0.85vw, 1rem);
      color: #475569;
      font-weight: 900;
      margin: 0 0 0.45vh 0;
      padding: 0;
      white-space: nowrap;
      line-height: 1;
    }

    .team-score {
      font-size: clamp(1.8rem, 2.1vw, 2.8rem);
      color: #0284c7;
      font-weight: 900;
      margin: 0;
      padding: 0;
      line-height: 1;
    }

    .team-card.active .team-score {
      color: #e11d48;
    }

    .skip-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      margin: 0;
      padding: 0;
    }

    .skip-button {
      height: 80%;
      min-width: clamp(120px, 8vw, 170px);
      border-radius: 14px;
      background: #64748b;
      border: 4px solid #334155;
      color: white;
      font-size: clamp(1.5rem, 1.8vw, 2.2rem);
      font-weight: 900;
      box-shadow: 0 5px 0 rgba(51, 65, 85, 0.25);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
      line-height: 1;
      margin: 0;
      padding: 0;
    }

    .skip-button:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 rgba(51, 65, 85, 0.25);
    }

    .setup-screen,
    .break-screen {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 3vh 3vw;
      background: rgba(15, 23, 42, 0.42);
      backdrop-filter: blur(6px);
    }

    .setup-screen.show,
    .break-screen.show {
      display: flex;
    }

    .setup-card,
    .break-card {
      width: min(92vw, 980px);
      border-radius: 36px;
      background: linear-gradient(135deg, #ffffff, #ecfeff);
      border: 6px solid #38bdf8;
      box-shadow: 0 28px 80px rgba(15, 23, 42, 0.24);
      padding: 4vh 4vw;
      text-align: center;
    }

    .setup-title {
      font-size: clamp(2.6rem, 4.8vw, 5.8rem);
      color: #075985;
      font-weight: 900;
      line-height: 1;
      margin: 0 0 1vh 0;
      padding: 0;
    }

    .setup-subtitle {
      font-size: clamp(1.4rem, 2.2vw, 2.8rem);
      color: #0f766e;
      font-weight: 900;
      line-height: 1;
      margin: 0 0 3vh 0;
      padding: 0;
    }

    .number-input {
      width: min(260px, 72vw);
      height: 8vh;
      min-height: 62px;
      border-radius: 22px;
      border: 5px solid #0ea5e9;
      text-align: center;
      font-size: clamp(2rem, 3vw, 4rem);
      font-weight: 900;
      color: #0f172a;
      background: #f8fafc;
      outline: none;
      box-shadow: 0 6px 0 rgba(14, 165, 233, 0.14);
      line-height: 1;
    }

    .rule-row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 1vw;
      margin: 2.4vh 0;
      padding: 0;
    }

    .rule-pill {
      padding: 1.1vh 1.7vw;
      border-radius: 999px;
      font-size: clamp(1.05rem, 1.35vw, 1.85rem);
      font-weight: 900;
      border: 4px solid;
      background: white;
      line-height: 1;
      margin: 0;
    }

    .big-play {
      min-width: min(360px, 72vw);
      height: 9vh;
      min-height: 72px;
      border-radius: 26px;
      background: #0ea5e9;
      border: 6px solid #0369a1;
      color: white;
      font-size: clamp(1.7rem, 2.4vw, 3.2rem);
      font-weight: 900;
      box-shadow: 0 8px 0 rgba(3, 105, 161, 0.28);
      line-height: 1;
      margin: 0;
      padding: 0;
    }

    .break-card {
      background: linear-gradient(135deg, #fffbeb, #ecfeff);
      border-color: #facc15;
    }

    .break-title {
      font-size: clamp(3.2rem, 6.5vw, 8rem);
      font-weight: 900;
      color: #d97706;
      line-height: 1;
      margin: 0 0 2vh 0;
      padding: 0;
    }

    .break-message {
      font-size: clamp(1.35rem, 2.2vw, 2.8rem);
      font-weight: 900;
      color: #0f172a;
      margin: 0 0 2vh 0;
      padding: 0;
      line-height: 1.1;
    }

    .break-count {
      font-size: clamp(4.2rem, 8vw, 10rem);
      font-weight: 900;
      color: #0ea5e9;
      line-height: 1;
      margin: 0;
      padding: 0;
    }

    .time-danger {
      color: #e11d48 !important;
    }

    @media (max-width: 1100px) {
      .app {
        grid-template-rows: 10vh 9vh 1fr 30vh 10vh;
        padding-left: 1vw;
        padding-right: 1vw;
      }

      .main-row {
        grid-template-columns: 1fr 24vw;
        padding: 0 0.6vw;
      }
    }

    @media (max-width: 760px) {
      .app {
        grid-template-rows: 8vh 12vh 1fr 34vh 12vh;
        gap: 0.5vh;
      }

      .title-box {
        width: 100%;
      }

      .title-text {
        font-size: clamp(1.35rem, 5vw, 2.1rem);
      }

      .top-row {
        grid-template-columns: 1fr;
      }

      .control-panel {
        justify-content: center;
      }

      .main-row {
        grid-template-columns: 1fr;
        padding: 0;
      }

      .side-panel {
        display: none;
      }

      .speech-bubble {
        min-height: 25vh;
      }

      .choice-grid {
        grid-template-columns: 1fr;
        gap: 1vh;
      }

      .footer {
        grid-template-columns: 1fr;
      }

      .skip-wrap {
        justify-content: flex-end;
      }

      .skip-button {
        width: 32vw;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="title-box">
      <div class="hi-badge">Hi</div>
      <h1 class="title-text">Greetings and Introductions</h1>
    </header>

    <section class="top-row">
      <div class="status-row">
        <div class="status-card card-blue">
          <div class="label text-sky-600">Level</div>
          <div id="levelBox" class="value">1</div>
        </div>

        <div class="status-card card-purple">
          <div class="label text-purple-600">Round</div>
          <div id="roundBox" class="value">1</div>
        </div>

        <div class="status-card card-green">
          <div class="label text-emerald-600">Score</div>
          <div id="scoreBox" class="value">0</div>
        </div>

        <div class="status-card card-orange">
          <div class="label text-orange-600">Time</div>
          <div id="timeBox" class="value">20</div>
        </div>
      </div>

      <div class="control-panel">
        <button id="listenBtn" class="soft-button btn-listen">Listen</button>
        <button id="pauseBtn" class="soft-button btn-pause">Pause</button>
        <button id="restartBtn" class="soft-button btn-restart">Restart</button>
      </div>
    </section>

    <main class="main-row">
      <section class="question-area">
        <div id="turnLabel" class="turn-pill">Team A Turn</div>

        <div class="speech-bubble">
          <div class="bubble-label">Listen</div>
          <div class="prompt-wrap">
            <div id="promptText" class="prompt-text">What's your name?</div>
          </div>
        </div>
      </section>

      <aside class="side-panel">
        <div id="starsBox" class="stars">0 Stars</div>
        <div id="visualCard" class="visual-card"></div>
      </aside>
    </main>

    <section class="choice-row">
      <div id="choices" class="choice-grid"></div>
    </section>

    <footer class="footer">
      <div id="teamScoreboard" class="team-scoreboard"></div>

      <div class="skip-wrap">
        <button id="skipBtn" class="skip-button">Skip</button>
      </div>
    </footer>
  </div>

  <section id="setupScreen" class="setup-screen show">
    <div class="setup-card animate__animated animate__zoomIn">
      <div class="setup-title">Greetings and Introductions</div>
      <div class="setup-subtitle">Clap, Listen, Pick, Score!</div>

      <label for="teamCountInput" class="block text-slate-700 font-black text-[clamp(1.1rem,1.7vw,2.3rem)] mb-3">
        Teams
      </label>

      <input
        id="teamCountInput"
        class="number-input"
        type="number"
        min="1"
        max="26"
        value="5"
      />

      <div class="rule-row">
        <div class="rule-pill border-emerald-400 text-emerald-800">Right: +5</div>
        <div class="rule-pill border-rose-400 text-rose-800">Oops or Time: +1</div>
        <div class="rule-pill border-yellow-400 text-yellow-800">Fast Round: +10</div>
      </div>

      <button id="setupPlayBtn" class="big-play">Play</button>
    </div>
  </section>

  <section id="breakScreen" class="break-screen">
    <div class="break-card animate__animated animate__bounceIn">
      <div class="break-title">Break Time</div>
      <div class="break-message">All teams played. Get ready for the next round!</div>
      <div id="breakCount" class="break-count">3</div>
    </div>
  </section>

  <script>
    const questions = [
      {
        prompt: "What's your name?",
        answer: "My name is Angelica.",
        choices: [
          "I'm from Venezuela.",
          "Nice to meet you.",
          "I'm your teacher.",
          "My name is Angelica."
        ],
        visual: "meet"
      },
      {
        prompt: "Hi. My name's Susie. What's yours?",
        answer: "Marcos.",
        choices: [
          "Marcos.",
          "Good morning.",
          "I'm your teacher.",
          "Nice to meet you."
        ],

    function loadVoices() {
      if ("speechSynthesis" in window) {
        voices = speechSynthesis.getVoices();

    if ("speechSynthesis" in window) {
      loadVoices();
      speechSynthesis.onvoiceschanged = loadVoices;
    }

    function getVoice() {
      if (!voices.length) return null;

      return (
        voices.find(v => v.lang === "en-US" && /Google US English|Microsoft Jenny|Samantha|Alex|Natural/i.test(v.name)) ||
        voices.find(v => v.lang === "en-US") ||
        voices.find(v => /^en/i.test(v.lang)) ||
        null
      );
    }

    function speak(text, onEnd) {
      if (!("speechSynthesis" in window)) {
        if (typeof onEnd === "function") onEnd();
        return;
      }

      speechSynthesis.cancel();

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "en-US";
      utterance.rate = 0.82;
      utterance.pitch = 1.02;
      utterance.volume = 1;

      const voice = getVoice();
      if (voice) utterance.voice = voice;

      utterance.onend = () => {
        if (typeof onEnd === "function") onEnd();
      };

      utterance.onerror = () => {
        if (typeof onEnd === "function") onEnd();
      };

      speechSynthesis.speak(utterance);
    }

    function getLevel() {
      if (round <= 2) return 1;
      if (round <= 4) return 2;
      if (round <= 6) return 3;
      return 4;
    }

    function getTimeByLevel() {
      const level = getLevel();
      if (level === 1) return 20;
      if (level === 2) return 18;
      if (level === 3) return 16;
      return 12;

    function isFastRound() {
      return round >= 7;

    function getCurrentQuestion() {
      return questions[questionIndex % questions.length];

    function shuffle(list) {
      const arr = [...list];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

      let value = parseInt(teamCountInput.value, 10);

    function fitOneLineText(textEl, containerEl, maxPx, minPx) {
      if (!textEl || !containerEl) return;

      textEl.style.transform = "scale(1)";
      textEl.style.fontSize = maxPx + "px";
      textEl.style.whiteSpace = "nowrap";
      textEl.style.display = "inline-block";
      textEl.style.lineHeight = "1";
      textEl.style.margin = "0";
      textEl.style.padding = "0";
      textEl.style.transformOrigin = "left center";

      const availableWidth = Math.max(30, containerEl.clientWidth);
      const availableHeight = Math.max(20, containerEl.clientHeight);

      let low = minPx;
      let high = maxPx;
      let best = minPx;

      for (let i = 0; i < 22; i++) {
        const mid = (low + high) / 2;
        textEl.style.fontSize = mid + "px";
        textEl.style.transform = "scale(1)";

        const fitsWidth = textEl.scrollWidth <= availableWidth;
        const fitsHeight = textEl.scrollHeight <= availableHeight;

        if (fitsWidth && fitsHeight) {
          best = mid;
          low = mid;
        } else {
          high = mid;
        }
      }

      textEl.style.fontSize = best + "px";

      const widthScale = availableWidth / Math.max(1, textEl.scrollWidth);
      const heightScale = availableHeight / Math.max(1, textEl.scrollHeight);
      const finalScale = Math.min(1, widthScale, heightScale);

      if (finalScale < 1) {
        textEl.style.transform = `scale(${Math.max(0.25, finalScale)})`;
      }
    }

    }

        const textWrap = card.querySelector(".choice-text-wrap");
        if (!letter || !text || !textWrap) return;

        const fakeBox = {
          clientWidth: textWrap.clientWidth,
          clientHeight: textWrap.clientHeight
        };

        fitOneLineText(text, fakeBox, 92, 22);

      fitOneLineText(text, fakeBox, 150, 30);

    function getCorrectLetter() {
      const q = getCurrentQuestion();
      const found = currentRenderedChoices.find(item => item.text === q.answer);

    function showCorrectOnly(letter, answerText) {

        <div class="reveal-card animate__animated animate__zoomIn">

    function renderQuestion(autoSpeak = true) {
      const q = getCurrentQuestion();

      locked = false;
      paused = false;
      timeLeft = getTimeByLevel();
      pauseBtn.textContent = "Pause";
      currentRenderedChoices = [];

      choicesBox.classList.remove("reveal");
      choicesBox.innerHTML = "";
      promptText.textContent = q.prompt;

      const mixed = shuffle(q.choices);

      mixed.forEach((choice, index) => {
        const letter = String.fromCharCode(65 + index);
        currentRenderedChoices.push({ letter, text: choice });

        const button = document.createElement("button");
        button.className = "choice-card animate__animated animate__fadeInUp";
        button.style.animationDelay = `${index * 0.05}s`;

        button.innerHTML = `
          <div class="letter">${letter}</div>
          <div class="choice-text-wrap">
            <div class="choice-text">${choice}</div>
          </div>
        `;

        button.addEventListener("click", () => chooseAnswer(choice));
        choicesBox.appendChild(button);
      });

      renderVisual(q.visual);
      updateUI();

      setTimeout(fitAllText, 30);
      startTimer();

      if (autoSpeak) {
        speak(q.prompt);
      }
    }

    function moveNextAfterAnswer() {
      setTimeout(nextTurn, 500);
    }

    function chooseAnswer(choice) {
      if (!started || paused || locked) return;

      locked = true;
      stopTimer();

      const q = getCurrentQuestion();
      const isCorrect = choice === q.answer;
      const correctLetter = getCorrectLetter();

      showCorrectOnly(correctLetter, q.answer);

      if (isCorrect) {
        teams[currentTeamIndex].score += isFastRound() ? 10 : 5;
        stars++;
        updateUI();

        speak(choice, moveNextAfterAnswer);
      } else {
        teams[currentTeamIndex].score += 1;
        stars = 0;
        updateUI();

        speak(q.answer, moveNextAfterAnswer);
      }
    }

    function handleTimeUp() {
      if (locked) return;

      locked = true;
      stopTimer();

      const q = getCurrentQuestion();
      const correctLetter = getCorrectLetter();

      teams[currentTeamIndex].score += 1;
      stars = 0;

      showCorrectOnly(correctLetter, q.answer);
      updateUI();

      speak(q.answer, moveNextAfterAnswer);
    }

    function skipQuestion() {
      if (!started || paused || locked) return;

      locked = true;
      stopTimer();

      const q = getCurrentQuestion();
      const correctLetter = getCorrectLetter();

      teams[currentTeamIndex].score += 1;
      stars = 0;

      showCorrectOnly(correctLetter, q.answer);
      updateUI();

      speak(q.answer, moveNextAfterAnswer);
    }

    function nextTurn() {
      if (!started) return;

      currentTeamIndex++;
      questionIndex++;

      if (currentTeamIndex >= teams.length) {
        currentTeamIndex = 0;
        round++;
        showBreakTime();
        return;
      }

      renderQuestion(true);
    }

    function showBreakTime() {
      stopTimer();

      if ("speechSynthesis" in window) {
        speechSynthesis.cancel();
      }

      breakScreen.classList.add("show");
      let count = 3;
      breakCount.textContent = count;

      speak("Break Time. All teams played. Get ready for the next round!");

      const breakTimer = setInterval(() => {
        count--;
        breakCount.textContent = count;

        breakCount.classList.remove("animate__animated", "animate__heartBeat");
        void breakCount.offsetWidth;
        breakCount.classList.add("animate__animated", "animate__heartBeat");

        if (count <= 0) {
          clearInterval(breakTimer);
          breakScreen.classList.remove("show");
          renderQuestion(true);
        }
      }, 1000);
    }

    function startGameFromSetup() {
      const count = clampTeamCount();
      makeTeams(count);

      currentTeamIndex = 0;
      questionIndex = 0;
      round = 1;
      stars = 0;
      started = true;
      paused = false;
      locked = false;

      setupScreen.classList.remove("show");

      if ("speechSynthesis" in window) {
        speechSynthesis.cancel();
      }

      stopTimer();
      renderScoreboard();
      renderQuestion(true);
    }

    function restartGame() {
      if ("speechSynthesis" in window) {
        speechSynthesis.cancel();
      }

      stopTimer();

      started = false;
      paused = false;
      locked = false;
      stars = 0;
      currentTeamIndex = 0;
      questionIndex = 0;
      round = 1;

      setupScreen.classList.add("show");
      breakScreen.classList.remove("show");

      initPreview(true);
    }

    function listenAgain() {
      if (!started || paused || locked) return;
      speak(getCurrentQuestion().prompt);
    }

    function togglePause() {
      if (!started || locked) return;

      paused = !paused;

      if (paused) {
        if ("speechSynthesis" in window) {
          speechSynthesis.cancel();
        }
        pauseBtn.textContent = "Resume";
      } else {
        pauseBtn.textContent = "Pause";
        speak(getCurrentQuestion().prompt);
      }
    }

    function initPreview(showOverlay = true) {
      makeTeams(5);
      currentTeamIndex = 0;
      round = 1;
      questionIndex = 0;
      timeLeft = 20;
      stars = 0;
      started = false;
      paused = false;
      locked = false;

      promptText.textContent = questions[0].prompt;
      renderVisual(questions[0].visual);

      currentRenderedChoices = [];
      choicesBox.classList.remove("reveal");
      choicesBox.innerHTML = "";

      const mixed = shuffle(questions[0].choices);

      mixed.forEach((choice, index) => {
        const letter = String.fromCharCode(65 + index);
        currentRenderedChoices.push({ letter, text: choice });

        const button = document.createElement("button");
        button.className = "choice-card";
        button.innerHTML = `
          <div class="letter">${letter}</div>
          <div class="choice-text-wrap">
            <div class="choice-text">${choice}</div>
          </div>
        `;
        choicesBox.appendChild(button);
      });

      updateUI();
      setTimeout(fitAllText, 30);
      stopTimer();

      if (showOverlay) {
        setupScreen.classList.add("show");
      }
    }

    setupPlayBtn.addEventListener("click", startGameFromSetup);
    listenBtn.addEventListener("click", listenAgain);
    pauseBtn.addEventListener("click", togglePause);
    restartBtn.addEventListener("click", restartGame);
    skipBtn.addEventListener("click", skipQuestion);
    teamCountInput.addEventListener("input", clampTeamCount);

    window.addEventListener("resize", fitAllText);

    window.addEventListener("beforeunload", () => {
      if ("speechSynthesis" in window) speechSynthesis.cancel();
    });

    initPreview(true);
  </script>
</body>
</html>
